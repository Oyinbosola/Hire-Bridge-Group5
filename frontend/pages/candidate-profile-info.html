<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Profile Creation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/candidate-profile-info.css" />
  <script src="../scripts/candidate-profile-info.js" defer></script>
</head>
<body>
  <div class="page-wrapper">
    <h1 class="page-title">Profile Creation</h1>

    <!-- Stepper -->
    <div class="stepper">
      <div class="step active">
        <div class="step-circle checked">✓</div>
        <span class="step-text sign-in">Sign In</span>
      </div>
      <div class="step active">
        <div class="step-circle">2</div>
        <span class="step-text basic-info">Basic Information</span>
      </div>
      <div class="step">
        <div class="step-circle">3</div>
        <span class="step-text exp">Experience</span>
      </div>
      <div class="step">
        <div class="step-circle">4</div>
        <span class="step-text job-pref">Job Preferences</span>
      </div>
    </div>

    <h2 class="section-title">Basic Information</h2>

    <div class="content-row">
      <!-- Left and center forms -->
      <form class="basic-form" id="profileForm">
        <div class="form-grid">
          <div class="form-column">
            <div class="form-group">
              <label for="fullName">Full Name</label>
              <input type="text" id="fullName" placeholder="" />
            </div>

            <div class="form-group">
              <label for="dob">Date of Birth</label>
              <input type="date" id="dob" />
            </div>

            <div class="form-group">
              <label for="country">Country</label>
              <input type="text" id="country" />
            </div>

            <div class="form-group">
              <label for="state">State</label>
              <input type="text" id="state" />
            </div>

            <div class="form-group">
              <label for="title">Professional Title</label>
              <input type="text" id="title" />
            </div>
          </div>

          <div class="form-column">
            <div class="form-group gender-group">
              <span class="label-inline">Gender</span>
              <label class="radio-label">
                <input type="radio" name="gender" value="male" checked />
                <span class="radio-custom"></span>
                <span>Male</span>
              </label>
              <label class="radio-label">
                <input type="radio" name="gender" value="female" />
                <span class="radio-custom"></span>
                <span>Female</span>
              </label>
            </div>

            <div class="form-group">
              <label for="phone">Phone Number</label>
              <input type="tel" id="phone" />
            </div>

            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" />
            </div>

            <div class="form-group">
              <label for="summary">Professional Summary</label>
              <textarea id="summary" rows="4"></textarea>
            </div>
          </div>
        </div>
      </form>

      <!-- Right: profile photo -->
      <div class="photo-column">
        <div class="photo-card">
          <div class="photo-icon" id="photoPreview">
            <!-- simple icon using CSS -->
            <div class="icon-circle outer">
              <div class="icon-circle inner"></div>
            </div>
            <div class="icon-curve"></div>
          </div>
          <label for="photoInput" class="upload-btn">
            Upload Profile Photo
          </label>
          <input type="file" id="photoInput" accept="image/*" />
        </div>
      </div>
    </div>

    <div class="bottom-row">
      <button type="button" class="next-btn" id="nextBtn">
        Next
        <span class="arrow">›</span>
      </button>
    </div>
  </div>

</body>
</html>
