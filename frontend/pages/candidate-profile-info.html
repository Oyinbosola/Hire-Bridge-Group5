<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Profile Creation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/candidate-profile-info.css" />
</head>
<body>
  <div class="page-wrapper">
    <h1 class="page-title">Profile Creation</h1>

    <!-- Stepper -->
    <div class="stepper">
      <div class="step active">
        <div class="step-circle checked">✓</div>
        <span class="step-text">Sign In</span>
      </div>
      <div class="step active">
        <div class="step-circle">2</div>
        <span class="step-text">Basic Information</span>
      </div>
      <div class="step">
        <div class="step-circle">3</div>
        <span class="step-text">Experience</span>
      </div>
      <div class="step">
        <div class="step-circle">4</div>
        <span class="step-text">Job Preferences</span>
      </div>
    </div>

    <h2 class="section-title">Basic Information</h2>

    <div class="content-row">
      <!-- Left and center forms -->
      <form class="basic-form" id="profileForm">
        <div class="form-grid">
          <div class="form-column">
            <div class="form-group">
              <label for="fullName">Full Name</label>
              <input type="text" id="fullName" placeholder="" />
            </div>

            <div class="form-group">
              <label for="dob">Date of Birth</label>
              <input type="date" id="dob" />
            </div>

            <div class="form-group">
              <label for="country">Country</label>
              <input type="text" id="country" />
            </div>

            <div class="form-group">
              <label for="state">State</label>
              <input type="text" id="state" />
            </div>

            <div class="form-group">
              <label for="title">Professional Title</label>
              <input type="text" id="title" />
            </div>
          </div>

          <div class="form-column">
            <div class="form-group gender-group">
              <span class="label-inline">Gender</span>
              <label class="radio-label">
                <input type="radio" name="gender" value="male" checked />
                <span class="radio-custom"></span>
                <span>Male</span>
              </label>
              <label class="radio-label">
                <input type="radio" name="gender" value="female" />
                <span class="radio-custom"></span>
                <span>Female</span>
              </label>
            </div>

            <div class="form-group">
              <label for="phone">Phone Number</label>
              <input type="tel" id="phone" />
            </div>

            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" />
            </div>

            <div class="form-group">
              <label for="summary">Professional Summary</label>
              <textarea id="summary" rows="4"></textarea>
            </div>
          </div>
        </div>
      </form>

      <!-- Right: profile photo -->
      <div class="photo-column">
        <div class="photo-card">
          <div class="photo-icon" id="photoPreview">
            <!-- simple icon using CSS -->
            <div class="icon-circle outer">
              <div class="icon-circle inner"></div>
            </div>
            <div class="icon-curve"></div>
          </div>
          <label for="photoInput" class="upload-btn">
            Upload Profile Photo
          </label>
          <input type="file" id="photoInput" accept="image/*" />
        </div>
      </div>
    </div>

    <div class="bottom-row">
      <button type="button" class="next-btn" id="nextBtn">
        Next
        <span class="arrow">›</span>
      </button>
    </div>
  </div>

  <script>
    // highlight focused input row
    document.querySelectorAll('.form-group input, .form-group textarea')
      .forEach(function (el) {
        el.addEventListener('focus', function () {
          this.parentElement.classList.add('focused');
        });
        el.addEventListener('blur', function () {
          this.parentElement.classList.remove('focused');
        });
      });

    // simple simulated step advance
    const steps = document.querySelectorAll('.step');
    const nextBtn = document.getElementById('nextBtn');
    let currentStepIndex = 1; // Basic Information

    nextBtn.addEventListener('click', function () {
      if (currentStepIndex < steps.length - 1) {
        steps[currentStepIndex].classList.remove('active');
        currentStepIndex += 1;
        steps[currentStepIndex].classList.add('active');
      }
    });

    // profile photo preview
    const photoInput = document.getElementById('photoInput');
    const photoPreview = document.getElementById('photoPreview');

    photoInput.addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (e) {
        photoPreview.style.backgroundImage = 'url(' + e.target.result + ')';
        photoPreview.classList.add('has-image');
      };
      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>
