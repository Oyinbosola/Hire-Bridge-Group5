<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started-HireBridge</title>
    <script src="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Montserrat:wght@600;700&display=swap">
    <link rel="stylesheet" href="../styles/recruiter-login.css">
</head>
<body>
    <div class="page-container">
       <div class="illustration-side">
       <div class="illustration-content">
       <img src="../../assets/images/image3.png" alt="" class="hero-img">
    
<div>
    <button class="back-btn" onclick="goBack()">Back</button>
</div>
</div>
</div>

<div class="form-side">
<div class="form-wrapper">
   <header>
    <h1>Get Started</h1>
    <p class="subtitle">Don't have an account? <a href="#">Sign Up</a></p>
   </header>
    
   <form id="loginform" action="">
   <div class="input-group">
    <label for="">Email</label>
    <input type="email" placeholder="Enter email" required>
   </div>

   <div class="input-group">
    <label for="">Password</label>
    <div class="password-wrapper">
        <input type="password" id="password" placeholder="Enter password" required>
        <span class="toggle-pass"><i class="ph-thin ph-eye-slash"></i></span>
    </div>
   </div>

   <div class="form-options">
    <label class="remember me" for=""><input type="checkbox">Remember me
    </label>
    <a href="#" class="forgot-link">Forget Password</a>
   </div>

   <button type="submit" class="sign-in-btn">Sign In</button>

   <div class="social-buttons">
    <button type="button" class="social-btn">
        <img class="icon" src="../../assets/icons/Google.svg" alt="">Sign in with Google
    </button>
    <button type="button" class="social-btn">
      <i class="ph-fill ph-apple-logo"></i> Sign in with Apple
    </button>
   </div>
   </form>
   </div>
   </div>
   </div>

   <script src="recruiter-login-js"></script>
</body>
</html>
