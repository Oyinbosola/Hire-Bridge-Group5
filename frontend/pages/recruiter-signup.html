 <!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register Your Company</title>

<!-- CSS -->
<link rel="stylesheet" href="../styles/recruiter-signup.css">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<div class="title">
<h1>Register Your Company</h1>
<p>Create an account to start hiring and managing your team</p>
</div>

<div class="card">

<div class="section-title">Company's Information</div>
<div class="section-sub">Tell us about your company</div>

<div class="form-grid">

<div class="form-group">
<label>Legal Business Name *</label>
<input type="text">
</div>

<div class="form-group">
<label>Industry Type *</label>
<select>
<option>Fintech</option>
<option>Technology</option>
<option>Consulting</option>
<option>E-commerce</option>
</select>
</div>

<div class="form-group">
<label>Phone Number *</label>
<input type="text">
</div>

<div class="form-group">
<label>Location *</label>
<select>

<option>Abia</option>
<option>Adamawa</option>
<option>Akwa Ibom</option>
<option>Anambra</option>
<option>Bauchi</option>
<option>Bayelsa</option>
<option>Benue</option>
<option>Borno</option>
<option>Cross River</option>
<option>Delta</option>
<option>Ebonyi</option>
<option>Edo</option>
<option>Ekiti</option>
<option>Enugu</option>
<option>Gombe</option>
<option>Imo</option>
<option>Jigawa</option>
<option>Kaduna</option>
<option>Kano</option>
<option>Katsina</option>
<option>Kebbi</option>
<option>Kogi</option>
<option>Kwara</option>
<option>Lagos</option>
<option>Nasarawa</option>
<option>Niger</option>
<option>Ogun</option>
<option>Ondo</option>
<option>Osun</option>
<option>Oyo</option>
<option>Plateau</option>
<option>Rivers</option>
<option>Sokoto</option>
<option>Taraba</option>
<option>Yobe</option>
<option>Zamfara</option>
<option>FCT Abuja</option>

</select>
</div>

<div class="form-group full">
<label>Email Address *</label>
<input type="email">
</div>

</div>

</div>


<div class="card">

<div class="form-grid">

<div class="form-group">
<label>Company Description</label>
<textarea></textarea>
</div>

<div class="form-group">
<label>&nbsp;</label>
<select>
<option>Lagos</option>
<option>Abuja</option>
<option>Port Harcourt</option>
</select>
</div>

<div class="form-group">
<label>Years of Experience *</label>
<select>
<option>Select experience</option>
<option>1 - 2 Years</option>
<option>3 - 5 Years</option>
<option>5 - 10 Years</option>
<option>10+ Years</option>
</select>
</div>

<div class="form-group">
<label>Office Address *</label>
<input type="text">
</div>

<div class="form-group full">

<label>Skills *</label>

<div class="skills-container">

<div class="skills-box" id="skillsBox"></div>

<button class="add-btn" id="addSkill">+</button>

</div>

<small style="color:#777">Add at least one skill</small>

</div>

</div>

</div>

</div>

<!-- JavaScript -->
<script src="script.js"></script>

</body>
</html>
