<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruiter-Registration</title>
    <link rel="stylesheet" href="../styles/recruiter-signup.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <script src="../scripts/api.js"></script>
    <script src="../scripts/recruiter-signup.js" defer></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Register Your Company</h1>
            <p>Create an account to start hiring and managing your team</p>
        </header>

        <form id="registrationForm">

            <!-- PERSONAL INFORMATION -->
            <section class="form-card">
                <div class="section-header">
                    <span class="icon">👤</span>
                    <div>
                        <h2>Personal Information</h2>
                        <p>Tell us about yourself</p>
                    </div>
                </div>
                
                <div class="grid-layout">
                    <div class="input-group">
                        <label>First Name *</label>
                        <input type="text" id="firstName" placeholder="John" required>
                    </div>
                    <div class="input-group">
                        <label>Last Name *</label>
                        <input type="text" id="lastName" placeholder="Doe" required>
                    </div>
                    <div class="input-group">
                        <label>Country *</label>
                        <select id="countrySelect" required>
                            <option value="">Select Country</option>
                            <option value="Nigeria">Nigeria</option>
                            <option value="Ghana">Ghana</option>
                            <option value="UK">United Kingdom</option>
                            <option value="USA">United States</option>
                            <option value="Germany">Germany</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>State *</label>
                        <select id="stateSelect" required>
                            <option value="">Select State</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Phone Number *</label>
                        <input type="tel" id="phone" placeholder="+234000000000" required>
                    </div>
                    <div class="input-group">
                        <label>Gender *</label>
                        <div class="radio-group">
                            <label><input type="radio" name="gender" value="male"> Male</label>
                            <label><input type="radio" name="gender" value="female"> Female</label>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Work Email Address *</label>
                        <input type="email" id="email" placeholder="email@example.com" required>
                    </div>
                    <div class="input-group">
                        <label>Password *</label>
                        <input type="password" id="password" placeholder="Enter password" required>
                    </div>
                    <div class="input-group">
                        <label>Job Title *</label>
                        <select id="jobTitle" required>
                            <option value="">Select Job Title</option>
                            <option>HR Manager</option>
                            <option>Senior Recruiter</option>
                            <option>Talent Acquisition Lead</option>
                            <option>Operations Director</option>
                        </select>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="auth" required>
                    <label for="auth">I confirm I am authorized to recruit on behalf of my company</label>
                </div>
            </section>

            <!-- COMPANY INFORMATION -->
            <section class="form-card">
                <div class="section-header">
                    <span class="icon">🏢</span>
                    <div>
                        <h2>Company's Information</h2>
                        <p>Tell us about your organization</p>
                    </div>
                </div>

                <div class="input-group">
                    <label>Legal Business Name *</label>
                    <input type="text" id="businessName" placeholder="e.g. TechGlobal" required>
                </div>
                
                <div class="grid-layout">
                    <div class="input-group">
                        <label>Company Website *</label>
                        <input type="url" id="companyWebsite" placeholder="http://www.company.com" required>
                    </div>
                    <div class="input-group">
                        <label>Industry *</label>
                        <select id="industry" required>
                            <option value="">Select Industry</option>
                            <option>Fintech</option>
                            <option>Oil & Gas</option>
                            <option>Healthcare</option>
                            <option>Education</option>
                            <option>Agriculture</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Company Size *</label>
                        <select id="companySize" required></select>
                    </div>
                    <div class="input-group">
                        <label>Location *</label>
                        <select id="location" required>
                            <option value="">Select Location</option>
                            <option>Ajah, Lagos</option>
                            <option>Ikeja, Lagos</option>
                            <option>Maitama, Abuja</option>
                            <option>Port Harcourt, Rivers</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>About the Organization *</label>
                    <textarea id="description" placeholder="Brief description of the organization..." required></textarea>
                </div>
            </section>

            <!-- RECRUITMENT EXPERIENCE -->
            <section class="form-card">
                <div class="section-header">
                    <span class="icon">💼</span>
                    <div>
                        <h2>Recruitment Experience</h2>
                        <p>Share your recruitment background</p>
                    </div>
                </div>

                <div class="input-group">
                    <label>Years in Recruitment/HR *</label>
                    <select id="yearsInRecruitment" required>
                        <option value="">Select experience</option>
                        <option>1 Year</option>
                        <option>2 Years</option>
                        <option>3 Years</option>
                        <option>4 Years</option>
                        <option>5+ Years</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Primary Hiring Areas *</label>
                    <div class="add-input-wrapper">
                        <input type="text" id="hiringAreaInput" placeholder="e.g., Software Engineering">
                        <button type="button" id="addAreaBtn" class="btn-add">+</button>
                    </div>
                    <div id="areaTagsContainer" class="tags-container"></div>
                    <small>Add at least one hiring area</small>
                </div>

                <div class="input-group">
                    <label>LinkedIn Profile</label>
                    <input type="url" id="linkedin" placeholder="https://linkedin.com/in/username">
                </div>
            </section>

            <div class="form-actions">
                <button type="button" class="btn-secondary">Save as draft</button>
                <button type="submit" class="btn-primary">Create Account</button>
            </div>
        </form>
    </div>

</body>
</html>
