<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hire Bridge - Sign Up</title>
  <link rel="stylesheet" href="../styles/signup.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

  <div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
      <div class="logo">
        <img src="../../assets/icons/logo-four.svg" alt="">
      </div>

      <h1>Create<br> Your Account</h1>

      <p>
        Sign up to explore opportunities, connect
        with professionals, and build meaningful
        career connections.
      </p>

      <img src="../../assets/images/image3.png" alt="" class="illustration">
      <a  class="back-btn" href="../../frontend/pages/welcome.html">
             <i class="fa fa-arrow-left"></i> Back
      </a>
    
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

      <div class="form-box">
        <h2>Get Started</h2>
        <p class="login-text">
          Already have an account? <a href="../pages/general-login.html">Log In</a>
        </p>

        <form>
          <div class="input-group">
            <i class="fa fa-user"></i>
            <input type="text" placeholder="Name" />
          </div>

          <div class="input-group">
            <i class="fa fa-envelope"></i>
            <input type="email" placeholder="Email" />
          </div>

          <div class="input-group">
            <i class="fa fa-lock"></i>
            <input type="password" placeholder="Password" />
          </div>

          <div class="input-group">
            <i class="fa fa-lock"></i>
            <input type="password" placeholder="Confirm Password" />
          </div>

          <button type="submit" class="submit-btn">Create Account</button>
        </form>

        <div class="divider">
          <span>Or sign up with</span>
        </div>

        <div class="socials">
          <button class="google">
            <i class="fab fa-google"></i> Google
          </button>

          <button class="apple">
            <i class="fab fa-apple"></i> Apple ID
          </button>
        </div>

      </div>

    </div>

  </div>


  <script src="../scripts/api.js"></script>
  <script src="../scripts/signup.js"></script>
</body>
</html>
